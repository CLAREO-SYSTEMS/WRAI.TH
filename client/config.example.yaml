# WRAI.TH Client Configuration
# Copy to config.yaml and adjust values

mode: "station"  # "station" (full) or "satellite" (client only)

relay:
  url: "http://localhost:8090"    # localhost for station, remote IP for satellite
  project: "default"

machine:
  name: "my-machine"              # unique name for this machine
  download_dir: "./data/downloads"

# --- Station-only ---

web:
  port: 8091
  host: "0.0.0.0"

discord:
  enabled: true
  token: "${DISCORD_TOKEN}"       # set in .env
  guild_id: ""                    # your Discord server ID
  channels:
    quant-pool: ""                # channel IDs
    dev-pool: ""
    ops-pool: ""

satellites:                       # other machines running satellite mode
  # remote-server:
  #   host: "192.168.0.42"
  #   port: 8092

# --- Satellite-only ---

stdout_api:
  port: 8092

# --- Shared ---

pools:
  quant:
    channel: "quant-pool"
    lead: "quant-lead"
    members: ["quant-researcher", "quant-backtester"]
  dev:
    channel: "dev-pool"
    lead: "backend-dev"
    members: []
  ops:
    channel: "ops-pool"
    lead: "cto"
    members: []

humans:
  # slug:
  #   name: "Display Name"
  #   role: "Role"
  #   discord_id: "123456789"
  #   is_executive: true
  #   pools: ["quant", "dev", "ops"]

agents:
  # agent-name:
  #   profile_slug: "profile-slug"
  #   work_dir: "/path/to/working/directory"
  #   machine: "my-machine"       # must match machine.name on the host
  #   pool: "ops"
  #   idle_timeout_seconds: 300
  #   auto_spawn: true

sse:
  reconnect_delay_seconds: 3
  fallback_poll_seconds: 10
  health_check_interval_seconds: 30

tokens:
  daily_limit_per_agent: null     # null = no limit
  warning_threshold: 0.8
